services:
  - type: web
    name: voiceover-mcp-server
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: HOST
        value: 0.0.0.0
      # PORT is auto-injected by Render at runtime - do not set it here.
      - key: TEMP_DIR
        value: ""
      - key: AUDIO_TTL_SECONDS
        value: "600"
      - key: DEFAULT_VOICE
        value: en-IN-PrabhatNeural
      - key: DEFAULT_RATE
        value: "+0%"
      - key: DEFAULT_PITCH
        value: "+0Hz"
      - key: DEFAULT_VOLUME
        value: "+0%"
      - key: MAX_LOG_ENTRIES
        value: "1000"
      # video_renderer: ffmpeg itself is provisioned via the imageio-ffmpeg
      # pip package (see requirements.txt + app/config.py), since this is
      # Render's native Python runtime (buildCommand is a plain pip
      # install, no apt-get/Dockerfile hook available). FFMPEG_BINARY is
      # left unset here so it auto-resolves to imageio-ffmpeg's bundled
      # static binary; only set it if pointing at a different ffmpeg.
      - key: DEFAULT_TRANSITION
        value: cut
      - key: CROSSFADE_SECONDS
        value: "0.5"
      - key: RENDER_TIMEOUT_SECONDS
        value: "600"
